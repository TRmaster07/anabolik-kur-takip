<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fotoğraf Takibi — Kür Takip</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/photos.css">
</head>
<body>
<button class="hamburger" id="hamburger">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
        <div class="page-header">
            <h1>📷 Fotoğraf Takibi</h1>
            <p>Her hafta için ön, yan ve arka fotoğraf yükleme ve karşılaştırma</p>
        </div>

        <!-- Week selector -->
        <div class="card" style="margin-bottom:20px">
            <div class="card-header">
                <span class="card-title">Hafta Seçimi</span>
                <button class="btn btn-secondary btn-sm" id="compareBtn">🔀 Karşılaştır</button>
            </div>
            <div class="week-thumb-grid" id="weekThumbGrid">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>

        <!-- Photo upload area -->
        <div class="card" id="photoCard" style="display:none">
            <div class="card-header">
                <span class="card-title" id="photoCardTitle">Hafta 1 Fotoğrafları</span>
                <span class="badge badge-default" id="uploadStatus"></span>
            </div>
            <div class="photo-grid" id="photoGrid">
                <!-- front, side, back slots -->
            </div>
        </div>

        <!-- Compare panel -->
        <div class="card" id="comparePanel" style="display:none">
            <div class="card-header">
                <span class="card-title">🔀 Hafta Karşılaştırma</span>
                <button class="btn btn-secondary btn-sm" id="closeCompare">✕ Kapat</button>
            </div>
            <div style="display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap">
                <div class="form-group" style="min-width:140px">
                    <label class="form-label">Sol Hafta</label>
                    <select id="compareLeft" class="form-control"></select>
                </div>
                <div class="form-group" style="min-width:140px">
                    <label class="form-label">Sağ Hafta</label>
                    <select id="compareRight" class="form-control"></select>
                </div>
                <div class="form-group" style="min-width:140px">
                    <label class="form-label">Tip</label>
                    <select id="compareType" class="form-control">
                        <option value="front">Ön</option>
                        <option value="side">Yan</option>
                        <option value="back">Arka</option>
                    </select>
                </div>
                <div style="display:flex;align-items:flex-end">
                    <button class="btn btn-primary" id="doCompare">Karşılaştır</button>
                </div>
            </div>
            <div class="compare-panel" id="comparePanelContent"></div>
        </div>

        <!-- Hidden file inputs -->
        <input type="file" id="fileInput" accept="image/*" style="display:none">
    </main>
</div>
<div id="toast-container"></div>

<!-- Lightbox -->
<div class="photo-lightbox" id="lightbox" style="display:none">
    <button class="photo-lightbox-close" id="lightboxClose">✕</button>
    <img id="lightboxImg" src="" alt="Fotoğraf">
    <div id="lightboxCaption" style="color:#fff;margin-top:10px;font-size:0.9rem;text-align:center"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/cloudinary-config.js"></script>
<script src="js/toast.js"></script>
<script src="js/utils.js"></script>
<script src="js/nav.js"></script>
<script src="js/auth.js"></script>
<script src="js/photos.js"></script>
</body>
</html>
